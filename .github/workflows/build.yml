name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ObsidianQuickNoteWidget.slnx

      - name: Build (Debug)
        run: dotnet build ObsidianQuickNoteWidget.slnx -c Debug --no-restore

      - name: Test
        run: dotnet test tests/ObsidianQuickNoteWidget.Core.Tests/ObsidianQuickNoteWidget.Core.Tests.csproj -c Debug --no-build --logger "trx;LogFileName=core-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

      - name: Publish widget provider (x64 Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet publish src/ObsidianQuickNoteWidget/ObsidianQuickNoteWidget.csproj
          -c Release
          -p:Platform=x64
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=false
          -p:AppxBundle=Always
          -p:UapAppxPackageBuildMode=SideloadOnly

      - name: Upload MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ObsidianQuickNoteWidget-msix
          path: |
            src/ObsidianQuickNoteWidget/AppPackages/**/*.msix
            src/ObsidianQuickNoteWidget/AppPackages/**/*.msixbundle
